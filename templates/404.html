<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            color: #333;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        .container {
            text-align: center;
            padding: 40px;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 16px 40px rgba(0,0,0,0.08);
            max-width: 420px;
            width: 100%;
        }
        h1 {
            font-size: 4rem;
            margin: 0;
        }
        p {
            margin: 20px 0;
            color: #666;
            line-height: 1.5;
        }
        a {
            display: inline-block;
            padding: 12px 24px;
            background: #007bff;
            color: #fff;
            text-decoration: none;
            border-radius: 6px;
        }
        a:hover {
            background: #0056d6;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>404</h1>
        <p>Sorry, the page you are looking for cannot be found.</p>
        <a href="/">Return to home</a>
    </div>
</body>
</html>
